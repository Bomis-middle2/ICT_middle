<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade 5 ICT - Chapter 7 Interactive Quiz</title>
    <style>
        :root { --primary-color: #2b579a; --secondary-color: #e2e9f3; --success-color: #2bc474; --error-color: #e74c3c; --text-dark: #2c3e50; --background: #f8f9fa; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background-color: var(--background); color: var(--text-dark); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 15px; }
        .quiz-container { background: white; width: 100%; max-width: 650px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); overflow: hidden; position: relative; min-height: 450px; display: flex; flex-direction: column; }
        #splash-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; transition: opacity 0.5s ease; }
        #splash-screen img { max-width: 220px; margin-bottom: 20px; }
        .view { display: none; padding: 30px; flex-direction: column; flex-grow: 1; }
        .view.active { display: flex; }
        .quiz-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--secondary-color); padding: 15px 30px; }
        .btn-audio { background: none; border: none; font-size: 24px; cursor: pointer; }
        .intro-title { color: var(--primary-color); font-size: 26px; margin-bottom: 15px; text-align: center; }
        .meta-info { background: var(--secondary-color); padding: 15px; border-radius: 8px; margin-bottom: 25px; line-height: 1.6; }
        .btn-primary { background-color: var(--primary-color); color: white; border: none; padding: 14px; font-weight: bold; border-radius: 8px; cursor: pointer; width: 100%; margin-top: auto; }
        .question-meta { display: flex; justify-content: space-between; font-weight: bold; color: #666; margin-bottom: 10px; }
        .question-text { font-size: 18px; font-weight: 600; margin-bottom: 20px; }
        .options-container { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
        .option-btn { background: white; border: 2px solid var(--secondary-color); border-radius: 8px; padding: 14px; cursor: pointer; text-align: left; width: 100%; }
        .option-btn.correct { background-color: #d4edda !important; border-color: var(--success-color) !important; color: #155724; }
        .option-btn.wrong { background-color: #f8d7da !important; border-color: var(--error-color) !important; color: #721c24; }
        .feedback-box { padding: 15px; border-radius: 8px; margin-bottom: 15px; display: none; }
        .feedback-box.hint { background-color: #fff3cd; border-left: 5px solid #ffc107; color: #856404; }
        .feedback-box.explanation { background-color: #e2f0d9; border-left: 5px solid var(--success-color); color: #385723; }
        #confetti-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 99; }
    </style>
</head>
<body>
    <div class="quiz-container">
        <div id="splash-screen"><img src="assets/innovine-logo.png" alt="Logo"></div>
        <canvas id="confetti-canvas"></canvas>
        <div class="quiz-header">
            <div id="score-display">Score: 0</div>
            <button class="btn-audio" id="audio-toggle" onclick="toggleMute()">🔊</button>
        </div>
        <div id="intro-view" class="view active">
            <h1 class="intro-title">ICT Chapter 7</h1>
            <div class="meta-info">
                <p><strong>Grade:</strong> 5</p>
                <p><strong>Subject:</strong> ICT</p>
                <p><strong>Topic:</strong> Using the Internet</p>
                <p><strong>Number of questions:</strong> 12</p>
            </div>
            <button class="btn-primary" onclick="startQuiz()">Start Practice</button>
        </div>
        <div id="question-view" class="view">
            <div class="question-meta"><span id="question-number"></span><span>⏱️ <span id="timer-count">45</span>s</span></div>
            <div class="question-text" id="question-text"></div>
            <div class="options-container" id="options-block"></div>
            <div class="feedback-box" id="feedback-block"></div>
            <button class="btn-primary" id="action-btn" style="display:none;" onclick="handleActionClick()">Next</button>
        </div>
        <div id="result-view" class="view">
            <h2 class="intro-title">Practice Completed!</h2>
            <div style="font-size: 48px; font-weight: bold; color: var(--primary-color); text-align: center; margin: 20px 0;" id="final-score-text">0%</div>
            <div style="font-size: 20px; text-align: center; margin-bottom: 30px;" id="final-message"></div>
            <button class="btn-primary" onclick="location.reload()">Restart</button>
        </div>
    </div>
    <script>
        const quizData = [
            { q: "Sneha wants to look up information for her science project on 'Space'. She needs to open a software application that allows her to access websites. Which of these should she open?", options: ["OpenOffice Impress", "Google Chrome", "Windows Media Player", "Recycle Bin"], correct: 1, hint: "It is a web browser.", explanation: "Google Chrome is a web browser used for accessing websites." },
            { q: "Look at the list of software: 1. Microsoft Edge, 2. Mozilla Firefox, 3. Apple Safari, 4. Google Chrome. What do all these four programs have in common?", options: ["They are all operating systems", "They are all search engines", "They are all web browsers", "They are all anti-virus software"], correct: 2, hint: "They are all tools for surfing the web.", explanation: "They are all web browsers." },
            { q: "Kabir is confused about how information travels on the internet. His teacher explains that there are 'sets of rules' that computers follow to communicate. What is the technical term for these rules?", options: ["Modems", "Protocols", "Browsers", "Links"], correct: 1, hint: "It starts with the letter P.", explanation: "Protocols are the sets of rules computers follow to communicate." },
            { q: "Rohan is visiting a website, but the page is taking too long to load or has frozen. Which button on his web browser should he click to try loading the page again?", options: ["Back button", "Forward button", "Refresh/Reload button", "Stop button"], correct: 2, hint: "It reloads the page.", explanation: "The Refresh/Reload button is used to reload a webpage." },
            { q: "To connect a home computer to the Internet, a student lists these requirements:<br>1. A computer &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; 2. A special device called a Modem<br>  3. An ISP (Internet Service Provider) &nbsp;&nbsp; 4. A Printer<br><br>Which item is NOT actually required to connect to the internet?", options: ["Item 1", "Item 2", "Item 3", "Item 4"], correct: 3, hint: "Printers are for hard copies, not internet connection.", explanation: "Item 4 (A printer) is used for hard copies and is not required for an internet connection." },
            { q: "Which of the following is NOT a web browser?", options: ["Netscape Navigator", "Opera", "Google Search", "Mozilla Firefox"], correct: 2, hint: "One of these is a search engine.", explanation: "Google Search is a search engine, not a browser application." },
            { q: "Meena wants to find a specific image of a 'Red Panda' for her chart. Instead of looking through text articles, which 'tab' on the Google search results page should she click?", options: ["News", "Images", "Videos", "Maps"], correct: 1, hint: "She is looking for a picture.", explanation: "The 'Images' tab allows users to find specific pictures." },
            { q: "Statement: You have to pay a fee to an ISP (Internet Service Provider). Reason: The ISP provides the physical connection and services needed to access the global internet.", options: ["Statement is true, but Reason is false", "Both Statement and Reason are true, and Reason explains Statement", "Both are false", "Statement is false, but Reason is true"], correct: 1, hint: "ISPs provide the necessary infrastructure.", explanation: "Both Statement and Reason are true, and Reason explains Statement." },
            { q: "While using Microsoft Edge, Shyam notices the search results are coming from 'Bing'. Why is this happening?", options: ["His computer is hacked", "Bing is the default search engine for Microsoft Edge", "Edge is not a real browser", "He typed 'Bing' by mistake"], correct: 1, hint: "It comes pre-configured with the browser.", explanation: "Bing is the default search engine for Microsoft Edge." },
            { q: "Anish found a very useful article on a website and wants to keep it on his computer so he can read it later even if he doesn't have internet. What should he do?", options: ["Refresh the page", "Click the Back button", "Save the webpage (File -> Save As)", "Close the browser"], correct: 2, hint: "Use the File menu options.", explanation: "Save the webpage (File -> Save As) allows you to read it offline." },
            { q: "Case: Priya is researching 'Healthy Diets'. She wants her search to be very specific. If she wants to find the meaning of a word, which 'Type of Search Engine' or tab should she look for?", options: ["News", "Definition", "Sounds", "General"], correct: 1, hint: "She is looking for the meaning of a word.", explanation: "The Definition feature helps find the meaning of a word." },
            { q: "You are moving from one webpage to another by clicking different links. What happens to the 'URL' or link in the address bar of your browser?", options: ["It stays exactly the same", "It disappears", "It changes automatically to match the new page", "You have to type it again manually each time"], correct: 2, hint: "The address updates to the current page.", explanation: "It changes automatically to match the new page." }
        ];

        let currentQuestionIndex = 0, score = 0, attemptsLeft = 2, timeRemaining = 45, timerInterval = null, muted = false;
        const audioCorrect = new Audio('assets/correct.mp3');
        const audioWrong = new Audio('assets/wrong.mp3');
        window.addEventListener('load', () => { setTimeout(() => { document.getElementById('splash-screen').style.display = 'none'; }, 5000); });
        function toggleMute() { muted = !muted; document.getElementById('audio-toggle').textContent = muted ? "🔇" : "🔊"; }
        function startQuiz() { document.getElementById('intro-view').classList.remove('active'); document.getElementById('question-view').classList.add('active'); loadQuestion(); }
        function loadQuestion() {
            clearInterval(timerInterval); attemptsLeft = 2; timeRemaining = 45;
            const q = quizData[currentQuestionIndex];
            document.getElementById('question-number').textContent = `Question ${currentQuestionIndex + 1} of 12`;
            document.getElementById('question-text').innerHTML = q.q;
            document.getElementById('options-block').innerHTML = '';
            document.getElementById('feedback-block').style.display = 'none';
            document.getElementById('action-btn').style.display = 'none';
            q.options.forEach((opt, idx) => {
                const btn = document.createElement('button'); btn.className = 'option-btn'; btn.textContent = opt;
                btn.onclick = () => submitAnswer(idx, btn); document.getElementById('options-block').appendChild(btn);
            });
            timerInterval = setInterval(() => { timeRemaining--; document.getElementById('timer-count').textContent = timeRemaining; if(timeRemaining <= 0) handleActionClick(); }, 1000);
        }
        function submitAnswer(idx, btn) {
            const q = quizData[currentQuestionIndex];
            if(idx === q.correct) {
                if(!muted) audioCorrect.play(); triggerSparklers(); score += (attemptsLeft === 2 ? 10 : 5); btn.classList.add('correct');
                document.getElementById('feedback-block').innerHTML = `✨ Correct!<br>${q.explanation}`; document.getElementById('feedback-block').className = 'feedback-box explanation'; document.getElementById('feedback-block').style.display = 'block';
                Array.from(document.getElementById('options-block').children).forEach(b => b.disabled = true); document.getElementById('action-btn').style.display = 'block'; clearInterval(timerInterval);
            } else {
                if(!muted) audioWrong.play(); attemptsLeft--; btn.classList.add('wrong'); btn.disabled = true;
                if(attemptsLeft === 1) { document.getElementById('feedback-block').innerHTML = `💡 Try Again!<br>Hint: ${q.hint}`; document.getElementById('feedback-block').className = 'feedback-box hint'; document.getElementById('feedback-block').style.display = 'block'; }
                else { document.getElementById('feedback-block').innerHTML = `Review: ${q.explanation}`; document.getElementById('feedback-block').className = 'feedback-box explanation'; document.getElementById('feedback-block').style.display = 'block'; Array.from(document.getElementById('options-block').children).forEach(b => b.disabled = true); document.getElementById('action-btn').style.display = 'block'; clearInterval(timerInterval); }
            }
            document.getElementById('score-display').textContent = `Score: ${score}`;
        }
        function handleActionClick() {
            if(currentQuestionIndex < quizData.length - 1) { currentQuestionIndex++; loadQuestion(); }
            else { 
                document.getElementById('question-view').classList.remove('active'); document.getElementById('result-view').classList.add('active');
                const p = Math.round((score / 120) * 100); document.getElementById('final-score-text').textContent = `${p}%`;
                document.getElementById('final-message').textContent = p >= 75 ? "Good job" : (p >= 40 ? "Review this chapter and try again" : "Let’s practise more");
            }
        }
        const canvas = document.getElementById('confetti-canvas'), ctx = canvas.getContext('2d'); let particles = [];
        function triggerSparklers() {
            canvas.width = canvas.parentElement.clientWidth; canvas.height = canvas.parentElement.clientHeight;
            for(let i=0; i<60; i++) particles.push({ x: canvas.width/2, y: canvas.height/2, radius: Math.random()*4+2, color: `hsl(${Math.random()*360}, 80%, 60%)`, vx: (Math.random()-0.5)*8, vy: (Math.random()-0.5)*8-3, alpha: 1, decay: 0.02 });
            requestAnimationFrame(render);
        }
        function render() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            particles.forEach((p, i) => { p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.alpha -= p.decay; ctx.globalAlpha = p.alpha; ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI*2); ctx.fill(); if(p.alpha <= 0) particles.splice(i, 1); });
            if(particles.length > 0) requestAnimationFrame(render);
        }
    </script>
</body>
</html>
