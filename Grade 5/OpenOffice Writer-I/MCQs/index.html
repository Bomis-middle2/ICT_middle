<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mail Merge Master - Grade 5</title>
    <style>
        :root {
            --primary: #4361ee;
            --secondary: #3f37c9;
            --accent: #f72585;
            --glass: rgba(255, 255, 255, 0.95);
            --text: #2b2d42;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Branding Overlay */
        #branding-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #ffffff;
            display: flex; justify-content: center; align-items: center;
            z-index: 10000;
        }

        #branding-overlay img { max-width: 280px; width: 60%; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        .quiz-container {
            width: 92%;
            max-width: 580px;
            background: var(--glass);
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
            text-align: center;
            border: 1px solid rgba(255,255,255,0.3);
            box-sizing: border-box;
            position: relative;
        }

        .hidden { display: none !important; }

        .header-stats {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; background: #f1f3f9;
            padding: 10px 20px; border-radius: 50px;
        }

        .timer-pill { background: var(--accent); color: white; padding: 4px 15px; border-radius: 20px; font-weight: bold; }

        button {
            background: linear-gradient(to right, var(--primary), var(--secondary));
            color: white; border: none; padding: 16px; margin: 8px 0;
            border-radius: 14px; font-size: 1rem; font-weight: 600;
            cursor: pointer; width: 100%; transition: 0.3s;
        }

        button:hover { transform: translateY(-2px); filter: brightness(1.1); }

        .option-btn {
            background: white; color: #4a4e69; text-align: left;
            border: 2px solid #edf2fb;
        }

        .option-btn:hover { border-color: var(--primary); background: #f8f9ff; }

        .q-image { 
            max-width: 100%; 
            height: auto; 
            border-radius: 12px; 
            margin: 15px 0; 
            border: 1px solid #ddd;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        #feedback { margin-top: 15px; padding: 15px; border-radius: 12px; font-weight: 500; }
        .correct-fb { background: #d8f3dc; color: #1b4332; }
        .wrong-fb { background: #fee2e2; color: #991b1b; }

        canvas#confetti-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 5000;
        }
    </style>
</head>
<body>

    <canvas id="confetti-canvas"></canvas>

    <div id="branding-overlay">
        <img src="assets/innovine-logo.png" alt="Innovine Logo">
    </div>

    <div id="intro-screen" class="quiz-container hidden">
        <div class="meta-info">Grade 5 • ICT • Chapter 3</div>
        <h1>Mail Merge Challenge</h1>
        <p>Master the tools for mass personalization!</p>
        <p><strong>12 Questions</strong> | <strong>45s per Question</strong></p>
        <button onclick="startQuiz()">Begin Quiz</button>
    </div>

    <div id="quiz-screen" class="quiz-container hidden">
        <div class="header-stats">
            <span id="score-text">Score: 0</span>
            <span class="timer-pill" id="timer-display">45s</span>
            <span id="mute-toggle" onclick="toggleMute()" style="cursor:pointer">🔊</span>
        </div>
        <h3 id="question-text"></h3>
        <div id="image-space"></div>
        <div id="options-stack"></div>
        <div id="feedback" class="hidden"></div>
    </div>

    <div id="result-screen" class="quiz-container hidden">
        <h2>Quiz Complete</h2>
        <h1 id="final-score" style="font-size: 3.5rem;">0/12</h1>
        <p id="result-msg"></p>
        <button onclick="location.reload()">Restart</button>
    </div>

    <audio id="snd-correct" src="assets/correct.mp3"></audio>
    <audio id="snd-wrong" src="assets/wrong.mp3"></audio>

    <script>
        const questions = [
            { q: "Rahul wants to send a birthday invite to 20 friends. Instead of typing each name manually, which feature should he use?", options: ["Spell Check", "Find and Replace", "Mail Merge", "Document Formatting"], correct: 2, hint: "It combines a document with a list.", expl: "Mail Merge is used to create multiple personalized documents at once." },
            { q: "In Mail Merge, what is the entire row of information for one person called?", options: ["A Field", "A Record", "A Main Document", "A Salutation"], correct: 1, hint: "It's the whole set for one entity.", expl: "A Record is a collection of fields for a single person or item." },
            { q: "Statement: Mail Merge makes business letters look professional. Reason: It adds specific names instead of 'Dear Customer'.", options: ["Both true, Reason explains Statement", "Both true, Reason doesn't explain", "Statement true, Reason false", "Statement false, Reason true"], correct: 0, hint: "Does personalization help?", expl: "Personalizing letters makes them more engaging and professional." },
            { q: "While creating the Data Source table, which key allows you to move quickly to the next cell?", options: ["Enter", "Spacebar", "Escape", "Tab"], correct: 3, hint: "Standard key for table navigation.", expl: "The Tab key moves the cursor to the next data entry field." },
            { q: "Which of the following is the final result produced after finishing the Mail Merge process?", options: ["Merged Document", "Data Source", "Mailing List", "Main Document"], correct: 0, hint: "The finished collection of letters.", expl: "The Merged Document contains all individual personalized pages." },
            { q: "Which of these is NOT a standard step in the Mail Merge process?", options: ["Select document type", "Create a data source", "Insert page border", "Preview the letters"], correct: 2, hint: "One is decoration, not function.", expl: "Page borders are formatting choices, not part of the merge wizard." },
            { q: "Can a user use an existing Excel spreadsheet as a Data Source?", options: ["No", "Yes, can use spreadsheets", "No, Excel is only for math", "Yes, but only for 10 names"], correct: 1, hint: "It works with external list files.", expl: "You can import existing lists from Excel or databases." },
            { q: "Why is the 'Match Fields' option used during the 'Address Block' step?", options: ["Change color", "Align wizard elements with Data Source columns", "Check spelling", "Delete duplicates"], correct: 1, image: "assets/G5_Chapter 3 Q8.png", hint: "It maps your column names to the wizard.", expl: "Match Fields ensures the software knows which column is 'Name' or 'City'." },
            { q: "An author wants to add 'Dear [Name],' at the start. Which option should he select?", options: ["Insert Picture", "Insert Table", "Create salutation", "Edit Header"], correct: 2, hint: "A formal greeting.", expl: "The 'Create salutation' step allows you to set up greetings." },
            { q: "Is it correct that you can never change the position of a Salutation once the wizard places it?", options: ["True", "False, it can be moved", "True, only in English", "False, only after restarting"], correct: 1, hint: "It acts like normal text.", expl: "Salutations are text blocks and can be moved or formatted freely." },
            { q: "An HR manager wants to skip one candidate from a list without deleting the file. How?", options: ["Use 'Exclude this recipient'", "Delete the database", "Print and discard", "Change to Email"], correct: 0, hint: "Look for an option in the preview stage.", expl: "'Exclude this recipient' lets you skip specific people." },
            { q: "To save all 50 personalized letters into one single file, select the option:", options: ["Save starting document", "Send as Email", "Print merged document", "Save merged document"], correct: 3, hint: "He needs a digital file of all finished letters.", expl: "Saving the merged document creates a file with all individual letters." }
        ];

        let cur = 0, score = 0, time = 45, timer, attempts = 0, muted = false, confettiID;

        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('branding-overlay').style.display = 'none';
                document.getElementById('intro-screen').classList.remove('hidden');
            }, 5000);
        });

        function startQuiz() {
            document.getElementById('intro-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            loadQ();
        }

        function loadQ() {
            stopConfetti(); 
            const data = questions[cur];
            attempts = 0; time = 45;
            document.getElementById('feedback').classList.add('hidden');
            document.getElementById('question-text').innerText = `Q${cur+1}. ${data.q}`;
            
            const imgSpace = document.getElementById('image-space');
            if (data.image) {
                imgSpace.innerHTML = `<img src="${data.image}" class="q-image" alt="Question Image">`;
            } else {
                imgSpace.innerHTML = '';
            }
            
            const stack = document.getElementById('options-stack');
            stack.innerHTML = '';
            data.options.forEach((o, i) => {
                const b = document.createElement('button');
                b.className = 'option-btn';
                b.innerText = o;
                b.onclick = () => check(i);
                stack.appendChild(b);
            });
            startTimer();
        }

        function startTimer() {
            clearInterval(timer);
            document.getElementById('timer-display').innerText = time + 's';
            timer = setInterval(() => {
                time--;
                document.getElementById('timer-display').innerText = time + 's';
                if(time <= 0) { clearInterval(timer); check(-1); }
            }, 1000);
        }

        function check(idx) {
            const data = questions[cur];
            const fb = document.getElementById('feedback');
            fb.classList.remove('hidden');

            if(idx === data.correct) {
                clearInterval(timer);
                score++;
                if(!muted) document.getElementById('snd-correct').play();
                fb.className = 'correct-fb';
                fb.innerText = "Correct! ✨";
                document.getElementById('score-text').innerText = `Score: ${score}`;
                startConfetti();
                setTimeout(next, 2000);
            } else {
                attempts++;
                if(!muted) document.getElementById('snd-wrong').play();
                if(attempts === 1 && idx !== -1) {
                    fb.className = 'wrong-fb';
                    fb.innerText = "Hint: " + data.hint;
                } else {
                    clearInterval(timer);
                    fb.className = 'wrong-fb';
                    fb.innerText = `Incorrect. Answer: ${data.options[data.correct]}. ${data.expl}`;
                    setTimeout(next, 4000);
                }
            }
        }

        function next() {
            cur++;
            if(cur < questions.length) loadQ();
            else showFinal();
        }

        function showFinal() {
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            const pct = (score/questions.length)*100;
            document.getElementById('final-score').innerText = `${score}/${questions.length}`;
            document.getElementById('result-msg').innerText = pct >= 75 ? "Good job!" : (pct >= 40 ? "Review and try again." : "Let’s practise more.");
        }

        function toggleMute() {
            muted = !muted;
            document.getElementById('mute-toggle').innerText = muted ? "🔇" : "🔊";
        }

        function startConfetti() {
            const canvas = document.getElementById('confetti-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            let pieces = [];
            for(let i=0; i<60; i++) {
                pieces.push({
                    x: Math.random()*canvas.width,
                    y: Math.random()*canvas.height - canvas.height,
                    r: Math.random()*6 + 4,
                    d: Math.random()*15,
                    color: `hsl(${Math.random()*360}, 70%, 50%)`,
                    v: Math.random()*3 + 2
                });
            }
            function draw() {
                ctx.clearRect(0,0,canvas.width, canvas.height);
                pieces.forEach(p => {
                    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
                    ctx.fillStyle = p.color; ctx.fill();
                    p.y += p.v; p.x += Math.sin(p.d);
                });
                confettiID = requestAnimationFrame(draw);
            }
            draw();
        }

        function stopConfetti() {
            cancelAnimationFrame(confettiID);
            const canvas = document.getElementById('confetti-canvas');
            const ctx = canvas.getContext('2d');
            if(ctx) ctx.clearRect(0, 0, canvas.width, canvas.height);
        }
    </script>
</body>
</html>
