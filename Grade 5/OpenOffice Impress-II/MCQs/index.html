<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formatting in Word Processors - Interactive Quiz</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f4f9; display: flex; justify-content: center; padding: 20px; margin: 0; }
        #quiz-container { background: white; width: 95%; max-width: 600px; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; }
        #top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; font-weight: bold; }
        .option-btn { border: 2px solid blue; border-radius: 15px; padding: 15px; margin: 10px 0; background: white; cursor: pointer; display: block; width: 100%; font-weight: bold; font-family: inherit; }
        .hint-box { background: #ffcccc; padding: 10px; border-radius: 8px; margin-top: 15px; color: #333; font-weight: bold; }
        .feedback-correct { border: 2px solid green; background: #d4edda; padding: 10px; border-radius: 8px; color: #155724; font-weight: bold; margin-top: 15px; }
        #logo-screen, #intro-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        .hidden { display: none !important; }
        img { max-width: 90%; height: auto; margin: 10px 0; border: 1px solid #ccc; }
        #q-text { font-weight: bold; font-size: 1.0rem; margin-bottom: 15px; text-align: left; }
        #confetti { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; background: url('https://raw.githubusercontent.com/catdad/canvas-confetti/master/demo/confetti.png') center/cover; display: none; z-index: 2000; }
    </style>
</head>
<body>

<div id="logo-screen"><img src="assets/innovine-logo.png" alt="Logo"></div>

<div id="intro-screen" class="hidden">
    <h1>Formatting in Word Processors</h1>
    <p><strong>Grade:</strong> 5</p>
    <p><strong>Subject:</strong>ICT</p>
    <p><strong>Topic:</strong> Word Processor Formatting</p>
    <p><strong>Number of questions:</strong> 12</p>
    <button onclick="startQuiz()" style="padding: 15px 30px; font-size: 18px; font-family: inherit;">Start Quiz</button>
</div>

<div id="quiz-container">
    <div id="game-area" class="hidden">
        <div id="top-bar">
            <div style="width: 50px;"></div>
            <div id="timer">45s</div>
            <div id="score-display">Score: 0</div>
        </div>
        <div id="q-text"></div>
        <div id="q-image-container"></div>
        <div id="options"></div>
        <div id="feedback"></div>
    </div>
</div>

<div id="confetti"></div>

<script>
    const questions = [
        { q: "A student is writing a science report and wants the page number and her class section to appear at the bottom of every page automatically. Which feature should she use?", a: "Footer", options: ["Header", "Footer", "Line Break", "Page Margin"], hint: "Think about the section of a page specifically reserved for repeating information at the very bottom." },
        { q: "A teacher is listing the types of manual breaks you can insert to format text spacing in a document. Which of the following does NOT belong on his list?", a: "Paragraph break", options: ["Page break", "Paragraph break", "Column break", "Line break"], hint: "Consider which option is a standard result of hitting the 'Enter' key rather than a specific layout break." },
        { q: "Read the statement and reason carefully:<br>Statement: For printing a wide class timetable with many columns, Landscape orientation is the best choice.<br>Reason: Landscape orientation prints the document horizontally along the height of the paper.", a: "Both Statement and Reason are true, and the Reason correctly explains the Statement.", options: ["Both Statement and Reason are true, and the Reason correctly explains the Statement.", "Both Statement and Reason are true, but the Reason does not explain the Statement.", "The Statement is true, but the Reason is false.", "The Statement is false, but the Reason is true."], hint: "Landscape orientation affects how the document fits on the paper width versus height." },
        { q: "Soumya has typed the word 'nature' 15 times in her essay, but her teacher told her to change it to 'natural'. After opening the dialog box shown in the image, which button will let her fix all the mistakes instantly?", img: "G5_Chapter 4 Q4.png", a: "Replace All", options: ["Find Next", "Replace", "Replace All", "Search All"], hint: "Look for the button designed to apply changes to every occurrence in the document." },
        { q: "Rahul is designing a two-column school newsletter. He finishes an article halfway down the first column and wants the next article to jump to the top of the second column. What should he insert?", a: "Column Break", options: ["Column Break", "Page Break", "Line Break", "Section Break"], hint: "He is moving content to the next designated column layout area." },
        { q: "Look at these page margin settings for a document: • Top: 2 inches • Bottom: 2 inches • Left: 1 inch • Right: 1 inch. What does the 'Left: 1 inch' measurement refer to?", a: "The blank space between the left edge of the paper and the text.", options: ["The blank space between the left edge of the paper and the text.", "The distance between the first and second line of text.", "The space between the header and the main title.", "The indentation of the first paragraph on the left."], hint: "Margins define the boundary of the printable area on the sheet." },
        { q: "A student writes down the steps to increase the space between the lines of a paragraph. Which step contains a factual ERROR? Step 1: Select the paragraph. Step 2: Click the Format menu and select Paragraph option. Step 3: Go to the Columns tab. Step 4: Change the Line spacing option and click OK.", a: "Error in Step 3", options: ["Error in Step 1", "Error in Step 2", "Error in Step 3", "Error in Step 4"], hint: "Check if the 'Columns' tab is relevant for adjusting line-to-line spacing." },
        { q: "An author wants to push a specific paragraph further from the left margin to make it stand out as a special quote. Which paragraph property should she use?", a: "Increase Indent", options: ["Line Spacing", "Increase Indent", "Decrease Indent", "Page Size"], hint: "Consider the property that shifts the paragraph from the margin." },
        { q: "Maya is creating a school magazine. She wants the title of the magazine to appear at the very top of every single page automatically. She clicks the Format menu and selects the 'Page' option to open the Page Style dialog box. Question: What must Maya check inside this dialog box to enable this repeating top title?", a: "Header on", options: ["Footer on", "Columns on", "Header on", "Margins on"], hint: "The repeating top section of a page is known as a..." },
        { q: "Continuing Maya's case from Question 9: Maya also wants to add a decorative border around her magazine title in the header area. After enabling the Header, which button inside the Page Style dialog box must she click to set the border and background?", a: "The 'More' button", options: ["The 'More' button", "The 'Fields' button", "The 'Insert Break' button", "The 'Portrait' button"], hint: "Advanced styling for backgrounds and borders is often found under an options button." },
        { q: "Ravi is typing a poem. After typing a line, he wants the next word to start immediately on a new line, but without starting a completely new paragraph or jumping to a new page. Which specific break should he insert?", a: "Line Break", options: ["Page Break", "Column Break", "Line Break", "Format Break"], hint: "A 'soft' return forces a new line without creating a new paragraph." },
        { q: "A designer is setting up the overall page dimensions and layout for a printed book using the Page Formatting menu. Which of the following properties does NOT belong in Page Formatting because it is actually a Paragraph Property?", a: "Line Spacing", options: ["Page Orientation", "Line Spacing", "Number of Columns", "Page Margins"], hint: "Which option affects text spacing within a single block of text rather than the whole page?" }
    ];

    let currentQ = 0, score = 0, attempts = 0, timer, timeLeft = 45;

    window.addEventListener('load', () => setTimeout(() => {
        document.getElementById('logo-screen').classList.add('hidden');
        document.getElementById('intro-screen').classList.remove('hidden');
    }, 5000));

    function startQuiz() {
        document.getElementById('intro-screen').classList.add('hidden');
        document.getElementById('game-area').classList.remove('hidden');
        renderQuestion();
    }

    function renderQuestion() {
        clearInterval(timer);
        attempts = 0; timeLeft = 45;
        document.getElementById('timer').innerText = timeLeft + "s";
        document.getElementById('feedback').className = "";
        document.getElementById('feedback').innerText = "";
        
        const q = questions[currentQ];
        document.getElementById('q-text').innerHTML = (currentQ + 1) + ". " + q.q;
        document.getElementById('q-image-container').innerHTML = q.img ? `<img src="${q.img}">` : "";
        const optDiv = document.getElementById('options');
        optDiv.innerHTML = "";
        q.options.forEach(o => {
            const btn = document.createElement('button');
            btn.className = "option-btn";
            btn.innerText = o;
            btn.onclick = () => checkAnswer(o);
            optDiv.appendChild(btn);
        });

        timer = setInterval(() => {
            timeLeft--;
            document.getElementById('timer').innerText = timeLeft + "s";
            if(timeLeft <= 0) { clearInterval(timer); alert("Time's up!"); nextQuestion(); }
        }, 1000);
    }

    function checkAnswer(choice) {
        const feedback = document.getElementById('feedback');
        if(choice === questions[currentQ].a) {
            score++;
            document.getElementById('score-display').innerText = "Score: " + score;
            feedback.className = 'feedback-correct';
            feedback.innerText = "Correct!";
            new Audio('assets/correct.mp3').play();
            document.getElementById('confetti').style.display = 'block';
            setTimeout(() => document.getElementById('confetti').style.display = 'none', 1000);
            setTimeout(nextQuestion, 1500);
        } else {
            attempts++;
            new Audio('assets/wrong.mp3').play();
            if(attempts < 2) {
                feedback.className = 'hint-box';
                feedback.innerText = "Hint: " + questions[currentQ].hint;
            } else {
                feedback.className = 'feedback-correct';
                feedback.innerText = "Correct answer was: " + questions[currentQ].a;
                setTimeout(nextQuestion, 2000);
            }
        }
    }

    function nextQuestion() {
        currentQ++;
        if(currentQ < questions.length) {
            renderQuestion();
        } else {
            showResults();
        }
    }

    function showResults() {
        document.getElementById('game-area').classList.add('hidden');
        const container = document.getElementById('quiz-container');
        let msg = "", percentage = (score / questions.length) * 100;
        if(percentage >= 75) msg = "Good job";
        else if(percentage >= 40) msg = "Review this chapter and try again";
        else msg = "Let’s practise more";
        container.innerHTML = `<h1>Quiz Finished!</h1><p style="font-size: 1.5rem;">Score: ${score}/${questions.length}</p><p style="font-size: 1.2rem; font-weight: bold;">${msg}</p><button onclick="location.reload()" style="padding: 15px 30px; margin-top: 20px; cursor: pointer;">Restart Quiz</button>`;
    }
</script>
</body>
</html>
