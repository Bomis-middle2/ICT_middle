<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evolution of Computers - Interactive Quiz</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary-blue: #1a237e;
            --accent-red: #c62828;
            --bg-gray: #f4f4f9;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-gray);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Branding Overlay */
        #branding-layer {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        #branding-layer img {
            max-width: 250px;
        }

        .container {
            width: 90%;
            max-width: 600px;
            background: var(--white);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            text-align: center;
        }

        .hidden { display: none !important; }

        .btn {
            background: var(--primary-blue);
            color: white;
            border: none;
            padding: 15px 25px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            margin: 10px 0;
        }

        .option-btn {
            background: #f0f0f0;
            color: #333;
            text-align: left;
        }

        #timer-container {
            width: 100%;
            background: #eee;
            height: 10px;
            border-radius: 5px;
            margin: 20px 0;
        }

        #timer-bar {
            height: 100%;
            background: var(--accent-red);
            width: 100%;
            border-radius: 5px;
        }

        .q-img { max-width: 100%; height: auto; border-radius: 8px; margin-bottom: 15px; }

        .feedback {
            padding: 15px;
            margin: 15px 0;
            border-radius: 8px;
            font-weight: bold;
        }

        .correct-box { background: #d4edda; color: #155724; }
        .wrong-box { background: #f8d7da; color: #721c24; }
        .hint-box { background: #fff3cd; color: #856404; }

        #mute-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: white;
            border: 1px solid #ccc;
            padding: 10px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 100;
        }
    </style>
</head>
<body>

    <button id="mute-toggle" onclick="toggleMute()">🔊</button>

    <div id="branding-layer">
        <img src="assets/innovine-logo.png" alt="Innovine Logo">
    </div>

    <div id="intro-screen" class="container hidden">
        <h1 style="color: var(--primary-blue);">Evolution of Computers</h1>
        <p><strong>Grade:</strong> 5</p>
        <p><strong>Subject:</strong> Computer Science</p>
        <p><strong>Topic:</strong> Chapter 1 Quiz</p>
        <p><strong>Questions:</strong> 12</p>
        <button class="btn" onclick="startQuiz()">Start Quiz</button>
    </div>

    <div id="quiz-screen" class="container hidden">
        <div style="display: flex; justify-content: space-between; font-weight: bold;">
            <span>Score: <span id="score-val">0</span></span>
            <span>Q: <span id="q-idx">1</span>/12</span>
        </div>
        <div id="timer-container"><div id="timer-bar"></div></div>
        
        <div id="q-content">
            <img id="q-image" class="q-img hidden" src="assets/G5_Chap1_Q 3.png">
            <h3 id="q-text"></h3>
            <div id="options"></div>
        </div>

        <div id="feedback" class="feedback hidden"></div>
        <button id="next-btn" class="btn hidden" onclick="nextQuestion()">Next Question</button>
    </div>

    <div id="result-screen" class="container hidden">
        <h2 style="color: var(--primary-blue);">Final Score</h2>
        <h1 id="final-score"></h1>
        <div id="result-msg" style="font-size: 1.2rem; font-weight: bold; margin: 20px 0; padding: 20px; border-radius: 8px;"></div>
        <button class="btn" onclick="location.reload()">Try Again</button>
    </div>

    <audio id="snd-right" src="assets/correct.mp3"></audio>
    <audio id="snd-wrong" src="assets/wrong.mp3"></audio>

    <script>
        const quizData = [
            { q: "Siya's grandfather uses a wooden frame with rods and beads to teach her basic addition and subtraction. Which device is it?", options: ["Pascaline", "Tabulating Machine", "Abacus", "Analytical Engine"], correct: 2, hint: "This tool uses sliding beads for calculations." },
            { q: "Statement: First-generation computers like ENIAC were not suitable for homes. Reason: They used vacuum tubes, which consumed massive power and space.", options: ["Both True, Reason explains Statement", "Both True, Reason doesn't explain", "Statement True, Reason False", "Statement False, Reason True"], correct: 0, hint: "Think about the massive size of vacuum tube computers." },
            { q: "Look at the picture. Which computer lab safety rule is being broken?", options: ["No dirty hands", "Keep computer covered", "Push chair in", "No food or drinks near computer"], correct: 3, hasImage: true, hint: "Look at the items sitting on the desk next to the computer." },
            // Replace the 4th item in quizData with this:
{ 
    q: "A computer is smaller than ENIAC but does not use Integrated Circuits. Look at the table below:\n\n<table style='width:100%; border-collapse:collapse; margin:15px 0; font-family:inherit;'><thead style='font-weight:bold;'><tr style='border: 2px solid #000;'><th style='border:2px solid #000; padding:8px; text-align:left;'>Generation of Computer</th><th style='border:2px solid #000; padding:8px; text-align:left;'>Technology Used</th></tr></thead><tbody><tr style='border:2px solid #000;'><td style='border:2px solid #000; padding:8px; text-align:left;'>First</td><td style='border:2px solid #000; padding:8px; text-align:left;'>Vacuum Tubes</td></tr><tr style='border:2px solid #000;'><td style='border:2px solid #000; padding:8px; text-align:left;'>Second</td><td style='border:2px solid #000; padding:8px; text-align:left;'>Transistors</td></tr></tbody></table>\nWhat technology does it use?", 
    options: ["Transistors", "Vacuum Tubes", "Microprocessors", "AI"], 
    correct: 0, 
    hint: "This technology defined the Second Generation of computers." 
},
            { q: "A history teacher tells a story about a machine from 1833 that could handle large amounts of data. A clever mathematician provided instructions to this machine using 0s and 1s, introducing binary mathematics. Who is the mathematician that gave these instructions?", options: ["Charles Babbage", "Ada Lovelace", "Blaise Pascal", "Herman Hollerith"], correct: 1, hint: "She is known as the world's first programmer." },
            { q: "Rahul is making a study chart for his exams. Which of these statements on his chart contains an ERROR? ", options: ["1st Gen: Vacuum Tubes", "2nd Gen: Transistors", "3rd Gen: Microprocessors instead of ICs", "5th Gen: AI"], correct: 2, hint: "Third-generation computers used Integrated Circuits." },
            { q: "You are creating a 'Good Habits' list for the school computer room. Which of the following does NOT belong on the good habits list?", options: ["Covering parts after use", "Keeping pens off screen", "Leaving chair in walking path", "Washing hands before typing"], correct: 2, hint: "Items in the path can cause people to trip." },
            { q: "An old 1950 article describes a room-sized computer that frequently breaks down because its fragile, heat-producing glass parts keep burning out. Which computer generation and component does this describe?", options: ["2nd Gen; Transistors", "1st Gen; Vacuum Tubes", "3rd Gen; ICs", "1st Gen; Microprocessors"], correct: 1, hint: "Glass tubes were used in the very first computers." },
            { q: "A large office needs a machine to quickly read and summarize employee attendance information stored on paper cards with holes punched in them. Whose invention would be best for this task?", options: ["Blaise Pascal", "Charles Babbage", "Herman Hollerith", "Ada Lovelace"], correct: 2, hint: "He designed the Tabulating Machine." },
           { 
    q: "Maya is using an UltraBook. Review the capabilities table below:<br><br><table style='width:100%; border-collapse:collapse; margin:15px 0; font-family: inherit;'><thead style='font-weight:bold;'><tr style='border: 2px solid #000;'><th style='border:2px solid #000; padding:10px; text-align:left;'>Read the device capabilities:<br>Generation of Computer</th><th style='border:2px solid #000; padding:10px; text-align:left;'>Technology Used</th></tr></thead><tbody><tr style='border:2px solid #000;'><td style='border:2px solid #000; padding:10px; text-align:left;'>Third</td><td style='border:2px solid #000; padding:10px; text-align:left;'>Operating system based, used keyboards</td></tr><tr style='border:2px solid #000;'><td style='border:2px solid #000; padding:10px; text-align:left;'>Forth</td><td style='border:2px solid #000; padding:10px; text-align:left;'>Personal computers, extremely powerful</td></tr><tr style='border:2px solid #000;'><td style='border:2px solid #000; padding:10px; text-align:left;'>Fifth</td><td style='border:2px solid #000; padding:10px; text-align:left;'>Voice recognition, decision making</td></tr></tbody></table><br>Based on the capabilities described, which generation is her device?", 
    options: ["2nd Gen", "3rd Gen", "4th Gen", "5th Gen"], 
    correct: 3, 
    hint: "Advanced logic and voice recognition are Fifth-generation features." 
},
            { q: "A team is building an Artificial Intelligence system capable of recognizing voices and making logical decisions. Based on the generations of computers, which specific technology is required for this fifth-generation machine? ", options: ["MSI", "SSI", "VLSI", "ULSI"], correct: 3, hint: "ULSI stands for Ultra Large-Scale Integration." },
            { q: "Statement: Charles Babbage is the father of computers. Reason: He invented the mouse and keyboard.", options: ["Both True, Reason explains", "Both True, Reason doesn't explain", "Statement True, Reason False", "Statement False, Reason True"], correct: 2, hint: "Babbage lived before the modern mouse was invented." }
        ];

        let currentQ = 0, score = 0, tries = 0, timer, timeLeft = 45, muted = false;

        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('branding-layer').classList.add('hidden');
                document.getElementById('intro-screen').classList.remove('hidden');
            }, 5000);
        });

        function toggleMute() {
            muted = !muted;
            document.getElementById('mute-toggle').innerText = muted ? "🔇" : "🔊";
        }

        function playSound(id) {
            if (!muted) {
                const s = document.getElementById(id);
                s.currentTime = 0;
                s.play();
            }
        }

        function startQuiz() {
            document.getElementById('intro-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            showQuestion();
        }

        function showQuestion() {
            tries = 0; timeLeft = 45;
            document.getElementById('feedback').classList.add('hidden');
            document.getElementById('next-btn').classList.add('hidden');
            const data = quizData[currentQ];
            document.getElementById('q-idx').innerText = currentQ + 1;
            document.getElementById('q-text').innerHTML = data.q;
            const img = document.getElementById('q-image');
            data.hasImage ? img.classList.remove('hidden') : img.classList.add('hidden');
            const optDiv = document.getElementById('options');
            optDiv.innerHTML = '';
            data.options.forEach((opt, i) => {
                const b = document.createElement('button');
                b.className = 'btn option-btn';
                b.innerText = opt;
                b.onclick = () => checkAns(i);
                optDiv.appendChild(b);
            });
            startTimer();
        }

        function startTimer() {
            clearInterval(timer);
            document.getElementById('timer-bar').style.width = '100%';
            timer = setInterval(() => {
                timeLeft--;
                document.getElementById('timer-bar').style.width = (timeLeft/45*100) + '%';
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    revealCorrect("Time is up!");
                }
            }, 1000);
        }

        function checkAns(idx) {
            const data = quizData[currentQ];
            const feed = document.getElementById('feedback');
            if (idx === data.correct) {
                clearInterval(timer);
                score++;
                document.getElementById('score-val').innerText = score;
                feed.innerHTML = "Good job! Correct.";
                feed.className = "feedback correct-box";
                feed.classList.remove('hidden');
                playSound('snd-right');
                confetti();
                disableOptions();
                document.getElementById('next-btn').classList.remove('hidden');
            } else {
                tries++;
                if (tries === 1) {
                    feed.innerHTML = "Not quite. Hint: " + data.hint;
                    feed.className = "feedback hint-box";
                    feed.classList.remove('hidden');
                    playSound('snd-wrong');
                } else {
                    clearInterval(timer);
                    revealCorrect("Incorrect.");
                }
            }
        }

        function revealCorrect(msg) {
            const data = quizData[currentQ];
            const feed = document.getElementById('feedback');
            feed.innerHTML = `${msg} The correct answer is: ${data.options[data.correct]}.`;
            feed.className = "feedback wrong-box";
            feed.classList.remove('hidden');
            playSound('snd-wrong');
            disableOptions();
            document.getElementById('next-btn').classList.remove('hidden');
        }

        function disableOptions() {
            const btns = document.querySelectorAll('.option-btn');
            btns.forEach(b => b.disabled = true);
        }

        function nextQuestion() {
            currentQ++;
            if (currentQ < quizData.length) showQuestion();
            else showResults();
        }

        function showResults() {
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            const percentage = (score / 12) * 100;
            document.getElementById('final-score').innerText = `${score} / 12`;
            const msgBox = document.getElementById('result-msg');
            if (percentage >= 75) {
                msgBox.innerText = "Good job";
                msgBox.style.backgroundColor = "#d4edda";
            } else if (percentage >= 40) {
                msgBox.innerText = "Review this chapter and try again";
                msgBox.style.backgroundColor = "#fff3cd";
            } else {
                msgBox.innerText = "Let’s practise more";
                msgBox.style.backgroundColor = "#f8d7da";
            }
        }
    </script>
</body>
</html>
