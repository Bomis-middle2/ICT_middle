<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade 7 ICT - Chapter 1 Interactive Quiz</title>
    <style>
        :root {
            --primary-color: #2b579a;
            --secondary-color: #e2e9f3;
            --success-color: #2bc474;
            --error-color: #e74c3c;
            --text-dark: #2c3e50;
            --text-light: #ffffff;
            --background: #f8f9fa;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--background);
            color: var(--text-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        .quiz-container {
            background: white;
            width: 100%;
            max-width: 650px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            overflow: hidden;
            position: relative;
            min-height: 450px;
            display: flex;
            flex-direction: column;
        }

        /* Splash Screen (Fixed Fail-Safe Display) */
        #splash-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 1;
            transition: opacity 0.5s ease, visibility 0.5s;
        }

        #splash-screen img {
            max-width: 220px;
            height: auto;
            margin-bottom: 20px;
        }

        .loader {
            width: 40px;
            height: 40px;
            border: 4px solid var(--secondary-color);
            border-top: 4px solid var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Views Layout */
        .view {
            display: none;
            padding: 30px;
            flex-direction: column;
            flex-grow: 1;
        }

        .view.active {
            display: flex;
        }

        /* Header / Controls */
        .quiz-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--secondary-color);
            padding: 15px 30px 15px 30px;
            background: #ffffff;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .btn-audio {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            padding: 5px;
        }

        /* Intro Screen */
        .intro-title {
            color: var(--primary-color);
            font-size: 26px;
            margin-bottom: 15px;
            text-align: center;
        }

        .meta-info {
            background: var(--secondary-color);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 25px;
            font-size: 16px;
            line-height: 1.6;
        }

        /* Interactive Buttons */
        .btn-primary {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            width: 100%;
            margin-top: auto;
        }

        .btn-primary:hover {
            background-color: #1e3d6b;
        }

        /* Question Layout */
        .progress-bar-container {
            width: 100%;
            height: 6px;
            background-color: var(--secondary-color);
            border-radius: 3px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background-color: var(--primary-color);
            width: 0%;
            transition: width 0.3s ease;
        }

        .question-meta {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            color: #666;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .timer-text {
            color: var(--error-color);
        }

        .question-text {
            font-size: 18px;
            font-weight: 600;
            line-height: 1.5;
            margin-bottom: 20px;
            white-space: pre-line;
        }

        /* Options layout */
        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .option-btn {
            background-color: white;
            border: 2px solid var(--secondary-color);
            border-radius: 8px;
            padding: 14px 18px;
            text-align: left;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            display: block;
        }

        .option-btn:hover:not(:disabled) {
            background-color: var(--secondary-color);
            border-color: #b0c4de;
        }

        .option-btn.correct {
            background-color: #d4edda !important;
            border-color: var(--success-color) !important;
            color: #155724;
            font-weight: bold;
        }

        .option-btn.wrong {
            background-color: #f8d7da !important;
            border-color: var(--error-color) !important;
            color: #721c24;
        }

        /* Feedback Boxes */
        .feedback-box {
            padding: 15px;
            border-radius: 8px;
            margin-top: 10px;
            margin-bottom: 15px;
            font-size: 15px;
            line-height: 1.5;
            display: none;
            animation: fadeIn 0.3s ease-in-out;
            white-space: pre-line;
        }

        .feedback-box.hint {
            background-color: #fff3cd;
            border-left: 5px solid #ffc107;
            color: #856404;
        }

        .feedback-box.explanation {
            background-color: #e2f0d9;
            border-left: 5px solid var(--success-color);
            color: #385723;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5deg); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Results Display */
        .result-score {
            font-size: 48px;
            font-weight: bold;
            color: var(--primary-color);
            text-align: center;
            margin: 20px 0;
        }

        .result-msg {
            font-size: 20px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 30px;
            padding: 15px;
            border-radius: 8px;
        }

        #confetti-canvas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 99;
        }
    </style>
</head>
<body>

    <div class="quiz-container">
        <!-- Splash Screen (Failsafe Branding) -->
        <div id="splash-screen">
            <img src="assets/innovine-logo.png" alt="Innovine Logo" id="logo-img">
            <h2 id="logo-placeholder" style="color: var(--primary-color); margin-bottom: 20px; font-weight: bold; tracking-letter: 2px;"></h2>
            <div class="loader"></div>
        </div>

        <!-- Animation Canvas -->
        <canvas id="confetti-canvas"></canvas>

        <!-- Dynamic Header Bar -->
        <div class="quiz-header">
            <div class="score-tracker" id="score-display">Score: 0</div>
            <div class="controls">
                <button class="btn-audio" id="audio-toggle" title="Toggle Sound">🔊</button>
            </div>
        </div>

        <!-- VIEW 1: Intro Screen -->
        <div id="intro-view" class="view active">
            <h1 class="intro-title">Grade 7 ICT — Interactive Practice</h1>
            <div class="meta-info">
                <p><strong>Grade:</strong> 7</p>
                <p><strong>Subject:</strong> ICT</p>
                <p><strong>Topic:</strong> Chapter 1: Data Processing</p>
                <p><strong>Total Questions:</strong> <span id="total-q-count">15</span></p>
            </div>
            <button class="btn-primary" onclick="startQuiz()">Start Practice</button>
        </div>

        <!-- VIEW 2: Question View -->
        <div id="question-view" class="view">
            <div class="progress-bar-container">
                <div class="progress-bar" id="progress"></div>
            </div>
            <div class="question-meta">
                <span id="question-number">Question 1 of 15</span>
                <span class="timer-text">⏱️ <span id="timer-count">45</span>s</span>
            </div>
            <div class="question-text" id="question-text">
                Question content
            </div>
            <div class="options-container" id="options-block">
                <!-- Dynamically populated options -->
            </div>
            <div class="feedback-box" id="feedback-block"></div>
            <button class="btn-primary" id="action-btn" style="display:none;" onclick="handleActionClick()">Next</button>
        </div>

        <!-- VIEW 3: Results View -->
        <div id="result-view" class="view">
            <h2 class="intro-title">Practice Completed!</h2>
            <div class="result-score" id="final-score-text">0%</div>
            <div class="result-msg" id="final-message">Feedback placeholder</div>
            <button class="btn-primary" onclick="restartQuiz()">Restart</button>
        </div>
    </div>

    <script>
        // Standard structural source mapping
        
const quizData = [
    {
        q: "A researcher sets up an online form to gather people's opinions on a new product. According to the stages of data processing, which stage does this represent?",
        options: ["Data output","Data collection","Data processing","Data input"],
        correct: 1,
        hint: "Think about the first step where information is gathered.",
        explanation: "Collecting opinions through forms is part of data collection."
    },
    {
        q: "A teacher has a list of unorganized student marks. She uses a software tool to sort them from highest to lowest to find the top performer. What is the overarching process of converting this raw data into meaningful information called?",
        options: ["Data execution","Data sorting","Data processing","Data storing"],
        correct: 2,
        hint: "The computer is transforming raw data into useful information.",
        explanation: "Data processing converts raw data into meaningful information."
    },
    {
        q: "After analyzing monthly sales, a retail manager receives a pie chart showing the top-selling items. This meaningful information presented in the form of a graph represents which stage of data processing?",
        options: ["Data collection","Data input","Data output","Data manipulation"],
        correct: 2,
        hint: "The graph is the final result shown to the user.",
        explanation: "Displaying analyzed information is called data output."
    },
    {
        q: "A telephone company compiles millions of call records throughout the month. On the 1st of the next month, the system automatically generates all customer bills overnight without human intervention. Which system is being used?",
        options: ["Real-time processing","Batch processing","Live processing","Online processing"],
        correct: 1,
        hint: "The records are processed together at one time.",
        explanation: "Batch processing handles large amounts of data together."
    },
    {
        q: "You are at an ATM trying to withdraw cash. As soon as you enter the amount, the system immediately updates your balance to prevent overdrawing. What kind of processing system makes this possible?",
        options: ["Batch processing","Sequential processing","Real-time processing","Offline processing"],
        correct: 2,
        hint: "The balance changes instantly.",
        explanation: "Real-time processing updates data immediately."
    },
    {
        q: "A graphic designer stores her project files on a cloud server so she can access and edit them from any computer with an internet connection. What type of processing system is she utilizing?",
        options: ["Real-time processing","Online processing","Batch processing","Standalone processing"],
        correct: 1,
        hint: "The files are accessed through the internet.",
        explanation: "Online processing allows data access and editing through a network."
    },
    {
        q: "A large payroll company prefers to process employee salaries at 2:00 AM on weekends. Based on the chapter, what is the primary advantage of doing this using a batch processing system?",
        options: ["It provides instant feedback to employees.","Processing can occur when the computer is not being used for anything else.","It requires constant human interaction to ensure accuracy.","It uses internet connections to speed up the process."],
        correct: 1,
        hint: "The task is scheduled during low computer usage time.",
        explanation: "Batch processing can run when the system is free."
    },
    {
        q: "Why would a hospital's patient monitoring system rely on real-time processing instead of batch processing?",
        options: ["Because it needs to process data immediately and cannot wait to put it in a pile for later.","Because batch processing requires an internet connection.","Because real-time processing is more accurate than batch processing.","Because real-time processing does not need human intervention."],
        correct: 0,
        hint: "Patient information must be handled instantly.",
        explanation: "Real-time processing is essential for immediate medical response."
    },
    {
        q: "A bank is clearing millions of physical cheques. The bank manager decides that for this specific task, accuracy is much more important than speed. Which processing system is preferred in this scenario?",
        options: ["Cloud computing","Real-time processing","Batch processing","Online processing"],
        correct: 2,
        hint: "The task involves handling many records together carefully.",
        explanation: "Batch processing is suitable when accuracy is prioritized over speed."
    },
    {
        q: "A clerk receives a stack of customer feedback forms and begins typing the responses into a computer database. Which stage of data processing does this typing activity represent?",
        options: ["Data collection","Data input","Data processing","Data output"],
        correct: 1,
        hint: "The clerk is entering information into the system.",
        explanation: "Typing data into a computer is called data input."
    },
    {
        q: "A startup company wants to adopt the 'future of data processing,' where shared resources are used to process data, and the processing is hidden from users. Which technology should they adopt?",
        options: ["Batch processing","Cloud computing","Data warehousing","Offline processing"],
        correct: 1,
        hint: "Resources are shared over the internet.",
        explanation: "Cloud computing uses shared online resources for processing."
    },
    {
        q: "You are booking a flight ticket for a holiday trip. Once you select a seat, the booking must be processed immediately so nobody else can select that exact same seat. What type of processing ensures this immediate update?",
        options: ["Batch processing","Online processing","Real-time processing","Data output"],
        correct: 2,
        hint: "The system must react instantly.",
        explanation: "Real-time processing updates seat availability immediately."
    },
    {
        q: "Which of the following statements is TRUE regarding a batch processing system once the process has started?",
        options: ["It requires constant internet connectivity.","It processes tasks simultaneously in real-time.","It requires continuous user interaction.","No user interaction is needed."],
        correct: 3,
        hint: "The process runs automatically once started.",
        explanation: "Batch processing does not need user interaction after starting."
    },
    {
        q: "What is the term used to describe a computer that cannot be accessed by the user physically but can be accessed via a network?",
        options: ["Local computer","Remote computer","Standalone computer","Data warehouse"],
        correct: 1,
        hint: "The computer is accessed from another location.",
        explanation: "A remote computer is accessed over a network."
    },
    {
        q: "Based on the chapter, how is real-time processing related to online processing?",
        options: ["They are entirely opposite systems.","Real-time processing is a subset of online processing.","Online processing is a subset of real-time processing.","They both operate without an internet connection."],
        correct: 1,
        hint: "One type belongs within the broader category of the other.",
        explanation: "Real-time processing is a type of online processing."
    }
];


        // State Machine Core Variables
        let currentQuestionIndex = 0;
        let score = 0;
        let attemptsLeft = 2;
        let timerInterval = null;
        let timeRemaining = 45;
        let audioMuted = false;

        // Auditory Infrastructure Instantiation
        const audioCorrect = new Audio('assets/correct.mp3');
        const audioWrong = new Audio('assets/wrong.mp3');

        // Document Cache Pointers
        const splashScreen = document.getElementById('splash-screen');
        const logoImage = document.getElementById('logo-img');
        const logoPlaceholder = document.getElementById('logo-placeholder');
        const introView = document.getElementById('intro-view');
        const questionView = document.getElementById('question-view');
        const resultView = document.getElementById('result-view');
        const scoreDisplay = document.getElementById('score-display');
        const audioToggle = document.getElementById('audio-toggle');
        const totalQCountSpan = document.getElementById('total-q-count');

        // Handle structural missing assets cleanly
        logoImage.onerror = function() {
            this.style.display = 'none';
            logoPlaceholder.style.display = 'block';
        };

        // Execution Controller (GUARANTEED DISMISSAL TIMEOUT)
        window.addEventListener('load', () => {
            totalQCountSpan.textContent = quizData.length;
            
            // Unconditional splash screen removal loop after exactly 5000 milliseconds
            setTimeout(() => {
                splashScreen.style.opacity = '0';
                setTimeout(() => {
                    splashScreen.style.display = 'none';
                }, 500);
            }, 5000);
        });

        // Audio controls
        audioToggle.addEventListener('click', () => {
            audioMuted = !audioMuted;
            audioToggle.textContent = audioMuted ? "❌" : "🔊";
        });

        function playSound(audioObject) {
            if (!audioMuted) {
                audioObject.currentTime = 0;
                audioObject.play().catch(e => console.log("Audio waiting for interaction context channel."));
            }
        }

        // Functional Quiz Engine Components
        function startQuiz() {
            introView.classList.remove('active');
            questionView.classList.add('active');
            currentQuestionIndex = 0;
            score = 0;
            updateScoreDisplay();
            loadQuestion();
        }

        function updateScoreDisplay() {
            scoreDisplay.textContent = `Score: ${score}`;
        }

        function loadQuestion() {
            clearInterval(timerInterval);
            attemptsLeft = 2;
            timeRemaining = 45;
            
            const qData = quizData[currentQuestionIndex];
            
            document.getElementById('question-number').textContent = `Question ${currentQuestionIndex + 1} of ${quizData.length}`;
            document.getElementById('progress').style.width = `${((currentQuestionIndex) / quizData.length) * 100}%`;
            document.getElementById('question-text').textContent = qData.q;
            document.getElementById('timer-count').textContent = timeRemaining;
            
            const feedbackBlock = document.getElementById('feedback-block');
            feedbackBlock.style.display = 'none';
            feedbackBlock.className = 'feedback-box';
            
            document.getElementById('action-btn').style.display = 'none';

            const optionsBlock = document.getElementById('options-block');
            optionsBlock.innerHTML = '';
            
            qData.options.forEach((option, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = option;
                btn.onclick = () => submitAnswer(index, btn);
                optionsBlock.appendChild(btn);
            });

            timerInterval = setInterval(() => {
                timeRemaining--;
                document.getElementById('timer-count').textContent = timeRemaining;
                if (timeRemaining <= 0) {
                    clearInterval(timerInterval);
                    forceTimeoutReveal();
                }
            }, 1000);
        }

        function submitAnswer(selectedIndex, clickedBtn) {
            const qData = quizData[currentQuestionIndex];
            const optionsBlock = document.getElementById('options-block');
            const feedbackBlock = document.getElementById('feedback-block');

            if (selectedIndex === qData.correct) {
                clearInterval(timerInterval);
                playSound(audioCorrect);
                triggerSparklers();
                clickedBtn.classList.add('correct');
                
                if (attemptsLeft === 2) {
                    score += 10;
                } else {
                    score += 5;
                }
                updateScoreDisplay();

                Array.from(optionsBlock.children).forEach(btn => btn.disabled = true);
                
                feedbackBlock.innerText = `✨ Correct!\n\n${qData.explanation}`;
                feedbackBlock.className = 'feedback-box explanation';
                feedbackBlock.style.display = 'block';
                
                showNextActionControl();
            } else {
                attemptsLeft--;
                clickedBtn.classList.add('wrong');
                clickedBtn.disabled = true;
                playSound(audioWrong);

                if (attemptsLeft === 1) {
                    feedbackBlock.innerText = `💡 Try Again!\nHint: ${qData.hint}`;
                    feedbackBlock.className = 'feedback-box hint';
                    feedbackBlock.style.display = 'block';
                } else {
                    clearInterval(timerInterval);
                    Array.from(optionsBlock.children).forEach(btn => btn.disabled = true);
                    optionsBlock.children[qData.correct].classList.add('correct');
                    
                    feedbackBlock.innerText = `Learning Review:\n\n${qData.explanation}`;
                    feedbackBlock.className = 'feedback-box explanation';
                    feedbackBlock.style.display = 'block';
                    
                    showNextActionControl();
                }
            }
        }

        function forceTimeoutReveal() {
            const qData = quizData[currentQuestionIndex];
            const optionsBlock = document.getElementById('options-block');
            const feedbackBlock = document.getElementById('feedback-block');
            
            Array.from(optionsBlock.children).forEach(btn => btn.disabled = true);
            optionsBlock.children[qData.correct].classList.add('correct');
            
            feedbackBlock.innerText = `⏳ Time's Up!\nLet's review the solution:\n\n${qData.explanation}`;
            feedbackBlock.className = 'feedback-box explanation';
            feedbackBlock.style.display = 'block';
            
            playSound(audioWrong);
            showNextActionControl();
        }

        function showNextActionControl() {
            const actionBtn = document.getElementById('action-btn');
            actionBtn.style.display = 'block';
            if (currentQuestionIndex === quizData.length - 1) {
                actionBtn.textContent = "View Results";
            } else {
                actionBtn.textContent = "Next Question";
            }
        }

        function handleActionClick() {
            if (currentQuestionIndex < quizData.length - 1) {
                currentQuestionIndex++;
                loadQuestion();
            } else {
                displayFinalScoreCard();
            }
        }

        function displayFinalScoreCard() {
            questionView.classList.remove('active');
            resultView.classList.add('active');
            document.getElementById('progress').style.width = '100%';
            
            const maximumPossiblePoints = quizData.length * 10;
            const percentageScored = Math.round((score / maximumPossiblePoints) * 100);
            
            document.getElementById('final-score-text').textContent = `${percentageScored}%`;
            
            const msgBlock = document.getElementById('final-message');
            
            if (percentageScored >= 75) {
                msgBlock.textContent = "Good job! You have mastered this chapter.";
                msgBlock.style.backgroundColor = "#d4edda";
                msgBlock.style.color = "#155724";
                triggerSparklers();
            } else if (percentageScored >= 40) {
                msgBlock.textContent = "Review this chapter and try again.";
                msgBlock.style.backgroundColor = "#fff3cd";
                msgBlock.style.color = "#856404";
            } else {
                msgBlock.textContent = "Let's practise more. Go through the core concepts again.";
                msgBlock.style.backgroundColor = "#f8d7da";
                msgBlock.style.color = "#721c24";
            }
        }

        function restartQuiz() {
            resultView.classList.remove('active');
            startQuiz();
        }

        // Particle System Infrastructure (Sparklers)
        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resizeCanvas() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
        }
        window.addEventListener('resize', resizeCanvas);

        function triggerSparklers() {
            resizeCanvas();
            for (let i = 0; i < 60; i++) {
                particles.push({
                    x: canvas.width / 2,
                    y: canvas.height / 2 - 50,
                    radius: Math.random() * 4 + 2,
                    color: `hsl(${Math.random() * 360}, 80%, 60%)`,
                    vx: (Math.random() - 0.5) * 8,
                    vy: (Math.random() - 0.5) * 8 - 3,
                    alpha: 1,
                    decay: Math.random() * 0.015 + 0.015
                });
            }
            if(particles.length <= 60) {
                requestAnimationFrame(renderParticles);
            }
        }

        function renderParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            particles.forEach((p, idx) => {
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.1;
                p.alpha -= p.decay;
                
                ctx.save();
                ctx.globalAlpha = p.alpha;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.fill();
                ctx.restore();
                
                if (p.alpha <= 0) {
                    particles.splice(idx, 1);
                }
            });
            
            if (particles.length > 0) {
                requestAnimationFrame(renderParticles);
            }
        }
    </script>
</body>
</html>
