<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICT Chapter 5 - Interactive Quiz</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f4f4f9; margin: 0; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 10px; }
        #quiz-container { background: white; width: 100%; max-width: 600px; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; }
        #top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; font-weight: bold; }
        .option-btn { border: 2px solid blue; border-radius: 12px; padding: 16px; margin: 8px 0; background: white; cursor: pointer; display: block; width: 100%; font-size: 1rem; font-weight: 600; text-align: left; transition: background 0.2s; }
        .option-btn:active { background: #eef; }
        .hint-box { background: #ffcccc; padding: 12px; border-radius: 8px; margin-top: 15px; color: #333; font-weight: bold; }
        .feedback-correct { border: 2px solid green; background: #d4edda; padding: 12px; border-radius: 8px; color: #155724; font-weight: bold; margin-top: 15px; }
        #logo-screen, #intro-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        .hidden { display: none !important; }
        #q-text { font-weight: bold; font-size: 1.1rem; margin-bottom: 20px; text-align: left; line-height: 1.4; }
        @media (max-width: 480px) { .option-btn { padding: 12px; font-size: 0.9rem; } }
    </style>
</head>
<body>

<div id="logo-screen"><img src="assets/innovine-logo.png" alt="Logo" style="max-width: 80%;"></div>

<div id="intro-screen" class="hidden">
    <h1>HTML & Web Design Basics</h1>
    <p><strong>Grade 7 | ICT Chapter 5</strong></p>
    <button onclick="startQuiz()" style="padding: 15px 40px; font-size: 1.2rem; cursor: pointer; border-radius: 8px;">Start Quiz</button>
</div>

<div id="quiz-container">
    <div id="game-area" class="hidden">
        <div id="top-bar">
            <div id="timer">45s</div>
            <div id="score-display">Score: 0</div>
        </div>
        <div id="q-text"></div>
        <div id="options"></div>
        <div id="feedback"></div>
    </div>
</div>

<script>
   const questions = [
        { q: "A local bakery wants to sell its custom cakes directly to customers over the internet and needs a system to accept credit card payments. According to the classification of websites, what type of website do they need to build?", a: "C) E-Commerce Website", options: ["A) Personal Website", "B) Educational Website", "C) E-Commerce Website", "D) News and Entertainment Website"], hint: "This type of website is designed for buying and selling products online." },
        { q: "A student is writing HTML code in Notepad and accidentally types '<HTML>' in uppercase and '<body>' in lowercase. What will happen when they open this file in a web browser?", a: "B) The code will work perfectly because HTML is a non-case sensitive language.", options: ["A) The browser will display a syntax error.", "B) The code will work perfectly because HTML is a non-case sensitive language.", "C) Only the uppercase tags will be executed.", "D) The webpage will fail to load the body content."], hint: "HTML tags are not case-sensitive, meaning <BODY> and <body> are treated the same." },
        { q: "A web developer wants the text 'Welcome to My Blog' to appear on the internet browser's top tab (title bar), but not inside the main visible area of the page. Which HTML tag should they use to enclose this text?", a: "C) <title>", options: ["A) <head>", "B) <h1>", "C) <title>", "D) <body>"], hint: "This tag defines the document's title shown in the browser's tab." },
        { q: "A teacher wants the main background of her class webpage to be a solid cyan color. She writes the code <strong>&lt;body ________='cyan'&gt;</strong>. Which attribute is missing from her code?", a: "C) bgcolor", options: ["A) background", "B) color", "C) bgcolor", "D) style"], hint: "This attribute is used specifically to set the background color of the body." },
        { q: "While typing code, Rahul uses the <strong>&lt;br&gt;</strong> tag to break a sentence into a new line, but he forgets to write a closing '&lt;/br&gt;' tag. Why does the line break still work perfectly without causing an error?", a: "A) Because br tag is an empty element and does not require a closing tag.", options: ["A) Because '<br>' is an empty element and does not require a closing tag.", "B) Because the browser automatically fixes missing container tags.", "C) Because line breaks only work in Notepad, not in browsers.", "D) Because '<br>' is an attribute, not a tag."], hint: "Some HTML tags do not have content and are called 'empty' or 'void' elements." },
        { q: "To make a nature blog look attractive, the creator wants to use an image file named 'forest.jpg' as the background of the entire webpage. Which of the following is the correct HTML code to achieve this?", a: "B) <body background='forest.jpg'>", options: ["A) <body bgcolor='forest.jpg'>", "B) <body background='forest.jpg'>", "C) <head image='forest.jpg'>", "D) <background src='forest.jpg'>"], hint: "Use the 'background' attribute inside the body tag to set an image." },
        { q: "A science teacher is creating a webpage showing the chemical formula for water as H2O. Which HTML formatting tag is required to make the number '2' appear slightly below the normal text line?", a: "D) <sub>", options: ["A) <sup>", "B) <b>", "C) <i>", "D) <sub>"], hint: "Subscript text appears half a character below the normal line." },
        { q: "A math student wants to show the algebraic equation (A+B)2 = A2 + B2 + 2AB on their webpage. Which tag will help them place the '2' properly as a power/exponent?", a: "A) <sup>", options: ["A) <sup>", "B) <sub>", "C) <font>", "D) <h1>"], hint: "Superscript text appears half a character above the normal line." },
        { q: "A web designer notices that the web browser completely ignores the five extra spacebar taps she typed between two words in her Notepad file. What code should she insert to manually force a non-breaking blank space?", a: "C) &nbsp", options: ["A) <space>", "B) <br>", "C) &nbsp", "D) <hr>"], hint: "This special character entity represents a non-breaking space." },
        { q: "A news website wants its main article headline to be the largest and most prominent text on the page. Which heading tag provides the largest default text size?", a: "C) <h1>", options: ["A) <h6>", "B) <head>", "C) <h1>", "D) <h3>"], hint: "Heading tags range from h1 to h6, where h1 is the largest." },
        { q: "An author wants to draw a visible red line across the screen to separate the introduction from the main article body. Which tag and attribute combination should they use?", a: "B) <hr color='red'>", options: ["A) <line color='red'>", "B) <hr color='red'>", "C) <br color='red'>", "D) <p color='red'>"], hint: "The horizontal rule tag creates a line across the page." },
        { q: "A designer wants a specific greeting sentence to appear in the 'Calibri' typeface instead of the browser's default font. Which attribute of the '<font>' tag should they use to change the typeface?", a: "A) face", options: ["A) face", "B) style", "C) size", "D) type"], hint: "The 'face' attribute defines the font family." },
        { q: "After writing an entire HTML code in a text editor like Notepad, a student saves it as 'mypage.txt'. When they double-click the file, it opens in Notepad again instead of the web browser. To fix this, what extension should they have used when saving?", a: "B) .html or .htm", options: ["A) .web", "B) .html or .htm", "C) .www", "D) .doc"], hint: "Web browsers recognize files specifically by the .html or .htm extension." },
        { q: "A user wants to define the main content area of their webpage that contains the text, graphics, and images visible to the visitor. Which structural tag is responsible for enclosing this content?", a: "C) <body>", options: ["A) <head>", "B) <html>", "C) <body>", "D) <title>"], hint: "Everything visible in the browser window is contained within this tag." },
        { q: "You are explaining internet basics to a friend. Based on the chapter, how would you correctly describe the World Wide Web (WWW)?", a: "C) An information system of interconnected webpages accessible through the internet using a web browser.", options: ["A) A text editor used to write markup languages.", "B) A computing device controlled by a processor.", "C) An information system of interconnected webpages accessible through the internet using a web browser.", "D) A single file containing HTML elements."], hint: "The WWW is a massive collection of interlinked documents hosted on the internet." }
    ];

    let currentQ = 0, score = 0, attempts = 0, timer, timeLeft = 45;
    const correctSound = new Audio('assets/correct.mp3');
    const wrongSound = new Audio('assets/wrong.mp3');

    window.addEventListener('load', () => setTimeout(() => {
        document.getElementById('logo-screen').classList.add('hidden');
        document.getElementById('intro-screen').classList.remove('hidden');
    }, 5000));

    function startQuiz() {
        document.getElementById('intro-screen').classList.add('hidden');
        document.getElementById('game-area').classList.remove('hidden');
        renderQuestion();
    }

    function renderQuestion() {
        clearInterval(timer);
        attempts = 0; timeLeft = 45;
        document.getElementById('timer').innerText = timeLeft + "s";
        document.getElementById('feedback').className = "";
        document.getElementById('feedback').innerText = "";
        
        const q = questions[currentQ];
        document.getElementById('q-text').innerHTML = (currentQ + 1) + ". " + q.q;
        const optDiv = document.getElementById('options');
        optDiv.innerHTML = "";
        q.options.forEach(o => {
            const btn = document.createElement('button');
            btn.className = "option-btn";
            btn.innerText = o;
            btn.onclick = () => checkAnswer(o);
            optDiv.appendChild(btn);
        });

        timer = setInterval(() => {
            timeLeft--;
            document.getElementById('timer').innerText = timeLeft + "s";
            if(timeLeft <= 0) { clearInterval(timer); nextQuestion(); }
        }, 1000);
    }

    function checkAnswer(choice) {
        const feedback = document.getElementById('feedback');
        if(choice === questions[currentQ].a) {
            score++;
            document.getElementById('score-display').innerText = "Score: " + score;
            feedback.className = 'feedback-correct';
            feedback.innerText = "Correct!";
            correctSound.play();
            confetti();
            setTimeout(nextQuestion, 1000);
        } else {
            attempts++;
            wrongSound.play();
            if(attempts < 2) {
                feedback.className = 'hint-box';
                feedback.innerText = "Hint: " + questions[currentQ].hint;
            } else {
                feedback.className = 'feedback-correct';
                feedback.innerText = "Correct answer was: " + questions[currentQ].a;
                setTimeout(nextQuestion, 2000);
            }
        }
    }

    function nextQuestion() {
        currentQ++;
        if(currentQ < questions.length) renderQuestion();
        else document.getElementById('game-area').innerHTML = `<h1>Quiz Finished!</h1><p style="font-size: 1.5rem;">Score: ${score}/${questions.length}</p><button onclick="location.reload()" style="padding: 15px 30px; cursor: pointer;">Restart Quiz</button>`;
    }
</script>
</body>
</html>
