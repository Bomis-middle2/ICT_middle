<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenOffice Calc Charts - Interactive Quiz</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #f4f4f9; 
            margin: 0; 
            min-height: 100vh;
            display: flex; 
            justify-content: center; 
            align-items: center;
            padding: 10px;
        }
        #quiz-container { 
            background: white; 
            width: 100%; 
            max-width: 600px; 
            padding: 20px; 
            border-radius: 12px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
            text-align: center;
        }
        #top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; font-weight: bold; }
        .option-btn { 
            border: 2px solid blue; 
            border-radius: 12px; 
            padding: 16px; 
            margin: 8px 0; 
            background: white; 
            cursor: pointer; 
            display: block; 
            width: 100%; 
            font-size: 1rem;
            font-weight: 600; 
            font-family: inherit; 
            transition: background 0.2s;
        }
        .option-btn:active { background: #eef; }
        .hint-box { background: #ffcccc; padding: 12px; border-radius: 8px; margin-top: 15px; color: #333; font-weight: bold; }
        .feedback-correct { border: 2px solid green; background: #d4edda; padding: 12px; border-radius: 8px; color: #155724; font-weight: bold; margin-top: 15px; }
        #logo-screen, #intro-screen { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: white; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 9999; 
            padding: 20px;
        }
        .hidden { display: none !important; }
        #q-text { font-weight: bold; font-size: 1.1rem; margin-bottom: 20px; text-align: left; line-height: 1.4; }
        @media (max-width: 480px) {
            h1 { font-size: 1.5rem; }
            #q-text { font-size: 1rem; }
            .option-btn { padding: 14px; font-size: 0.95rem; }
        }
    </style>
</head>
<body>

<div id="logo-screen"><img src="assets/innovine-logo.png" alt="Logo" style="max-width: 80%;"></div>

<div id="intro-screen" class="hidden">
    <h1>Charts in OpenOffice Calc</h1>
    <p><strong>Grade 7 | ICT Chapter 3</strong></p>
    <button onclick="startQuiz()" style="padding: 15px 40px; font-size: 1.2rem; cursor: pointer; border-radius: 8px;">Start Quiz</button>
</div>

<div id="quiz-container">
    <div id="game-area" class="hidden">
        <div id="top-bar">
            <div id="timer">45s</div>
            <div id="score-display">Score: 0</div>
        </div>
        <div id="q-text"></div>
        <div id="options"></div>
        <div id="feedback"></div>
    </div>
</div>

<script>
    const questions = [
        { q: "A business analyst looking at a printed sales chart wants to know which color represents 'Sales' and which represents 'Expenses'. Which chart component should they look at?", a: "C) Legend", options: ["A) Plot Area", "B) Chart Title", "C) Legend", "D) X-axis"], hint: "This component acts as a key to identify data series colors." },
        { q: "A student is pointing to the exact rectangular space on a graph where the bars and lines are actually drawn between the two axes. What is this specific area called?", a: "B) Plot Area", options: ["A) Chart Area", "B) Plot Area", "C) Legend", "D) Data Range"], hint: "It is the inner section where the data visualization occurs." },
        { q: "A company wants to show the percentage contribution of different smartphone brands to the total market share to prove that Android leads with 56%. Which chart is best suited to display this single data series?", a: "D) Pie Chart", options: ["A) Column Chart", "B) Line Chart", "C) Bar Chart", "D) Pie Chart"], hint: "Use this to represent parts of a whole as a percentage." },
        { q: "A meteorologist wants to illustrate how the temperature of a city changed continuously over the past 12 months. Which chart uses connecting data points and is best to show this trend over a period of time?", a: "A) Line Chart", options: ["A) Line Chart", "B) Pie Chart", "C) Bar Chart", "D) Column Chart"], hint: "This chart type is perfect for showing trends over time." },
        { q: "A teacher wants to compare the individual final exam marks of 5 students. She prefers a visual format that displays the data in the form of long, rectangular, horizontal rods. Which chart type should she select?", a: "B) Bar Chart", options: ["A) Column Chart", "B) Bar Chart", "C) Line Chart", "D) Pie Chart"], hint: "These are horizontal versions of column charts." },
        { q: "A retail manager wants to compare the monthly sales of three different products using vertical bars, with the categories on the horizontal axis. Which chart should they use?", a: "C) Column Chart", options: ["A) Pie Chart", "B) Bar Chart", "C) Column Chart", "D) Scatter Chart"], hint: "This chart uses vertical bars to compare values." },
        { q: "You are using OpenOffice Calc to create a visual report. Which feature allows you to perform all the steps sequentially, from choosing the chart type to adding titles?", a: "B) Chart Wizard", options: ["A) Print Wizard", "B) Chart Wizard", "C) Data Series Wizard", "D) Graphic Wizard"], hint: "It is an interactive guide that helps you build a chart step-by-step." },
        { q: "While creating a chart, Sarah needs to add a suitable title to the top of her graph and specify names for the X and Y axes. Which option/step in the Chart Wizard dialog box allows her to do this?", a: "D) Chart Elements", options: ["A) Data Range", "B) Chart Type", "C) Data Series", "D) Chart Elements"], hint: "This step handles titles, labels, and legends." },
        { q: "You realize you forgot to include a specific column of data in your existing chart. Which option in the Chart Wizard helps you easily 'Add' a new data series or 'Remove' an existing one?", a: "A) Data Series", options: ["A) Data Series", "B) Chart Elements", "C) Display Grids", "D) Chart Type"], hint: "This section manages the source data used in the chart." },
        { q: "An accountant needs a hard copy of only the specific cells containing the Q1 financial summary, rather than the entire worksheet. Which option should they check in the Print dialog box?", a: "C) Selected Cells", options: ["A) All sheets", "B) Selected sheets", "C) Selected Cells", "D) All pages"], hint: "Choose this option to print only what you have highlighted." },
        { q: "You are in a hurry and want to print the current OpenOffice Calc spreadsheet directly to the default printer without opening and configuring options in the print dialog box. What is the quickest way to do this?", a: "B) Click the Print File Directly icon on the function toolbar", options: ["A) Press Ctrl+P", "B) Click the Print File Directly icon on the function toolbar", "C) Go to File -> Print", "D) Open Chart Wizard"], hint: "Look for the printer icon in the standard toolbar." },
        { q: "What is the standard keyboard shortcut used to open the Print dialog box to print a worksheet in OpenOffice Calc?", a: "C) Ctrl+P", options: ["A) Ctrl+S", "B) Ctrl+C", "C) Ctrl+P", "D) Ctrl+X"], hint: "Most programs use this standard combination for printing." },
        { q: "In a column chart comparing different fruits' production, the names of the fruits (Mango, Cherry, Pineapple) act as categories. On which axis are these categories generally represented?", a: "D) X-axis", options: ["A) Y-axis", "B) Z-axis", "C) Vertical axis", "D) X-axis"], hint: "Categories are typically placed along the horizontal base line." },
        { q: "A user wants to define the way data is arranged on their chart. They want to change whether the first row or first column is used as labels on the axes. Which step of the Chart Wizard provides this option?", a: "A) Data Range", options: ["A) Data Range", "B) Chart Elements", "C) Chart Type", "D) Print Dialog"], hint: "This step determines which cells contain the labels and data." },
        { q: "Why might a business analyst prefer creating a chart rather than just handing over a raw spreadsheet table containing thousands of rows of data?", a: "B) Because charts simplify the complexity of data and present it in an understandable, insightful form.", options: ["A) Because charts automatically fix incorrect data.", "B) Because charts simplify the complexity of data and present it in an understandable, insightful form.", "C) Because charts require less storage space on the computer.", "D) Because raw data cannot be printed."], hint: "Charts transform numbers into visual information that is easier to interpret." }
    ];

    let currentQ = 0, score = 0, attempts = 0, timer, timeLeft = 45;
    const correctSound = new Audio('assets/correct.mp3');
    const wrongSound = new Audio('assets/wrong.mp3');

    window.addEventListener('load', () => {
        setTimeout(() => {
            document.getElementById('logo-screen').classList.add('hidden');
            document.getElementById('intro-screen').classList.remove('hidden');
        }, 5000);
    });

    function startQuiz() {
        document.getElementById('intro-screen').classList.add('hidden');
        document.getElementById('game-area').classList.remove('hidden');
        renderQuestion();
    }

    function renderQuestion() {
        clearInterval(timer);
        attempts = 0; timeLeft = 45;
        document.getElementById('timer').innerText = timeLeft + "s";
        document.getElementById('feedback').className = "";
        document.getElementById('feedback').innerText = "";
        
        const q = questions[currentQ];
        document.getElementById('q-text').innerHTML = (currentQ + 1) + ". " + q.q;
        const optDiv = document.getElementById('options');
        optDiv.innerHTML = "";
        q.options.forEach(o => {
            const btn = document.createElement('button');
            btn.className = "option-btn";
            btn.innerText = o;
            btn.onclick = () => checkAnswer(o);
            optDiv.appendChild(btn);
        });

        timer = setInterval(() => {
            timeLeft--;
            document.getElementById('timer').innerText = timeLeft + "s";
            if(timeLeft <= 0) { clearInterval(timer); nextQuestion(); }
        }, 1000);
    }

    function checkAnswer(choice) {
        const feedback = document.getElementById('feedback');
        if(choice === questions[currentQ].a) {
            score++;
            document.getElementById('score-display').innerText = "Score: " + score;
            feedback.className = 'feedback-correct';
            feedback.innerText = "Correct!";
            correctSound.play();
            confetti();
            setTimeout(nextQuestion, 1000);
        } else {
            attempts++;
            wrongSound.play();
            if(attempts < 2) {
                feedback.className = 'hint-box';
                feedback.innerText = "Hint: " + questions[currentQ].hint;
            } else {
                feedback.className = 'feedback-correct';
                feedback.innerText = "Correct answer was: " + questions[currentQ].a;
                setTimeout(nextQuestion, 2000);
            }
        }
    }

    function nextQuestion() {
        currentQ++;
        if(currentQ < questions.length) renderQuestion();
        else {
            document.getElementById('game-area').innerHTML = `<h1>Quiz Finished!</h1><p style="font-size: 1.5rem;">Score: ${score}/${questions.length}</p><button onclick="location.reload()" style="padding: 15px 30px; cursor: pointer;">Restart Quiz</button>`;
        }
    }
</script>
</body>
</html>
