<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenOffice 4 Calc-II - Interactive Quiz</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f4f9; display: flex; justify-content: center; padding: 20px; margin: 0; }
        #quiz-container { background: white; width: 95%; max-width: 600px; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; }
        #top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; font-weight: bold; }
        .option-btn { border: 2px solid blue; border-radius: 15px; padding: 15px; margin: 10px 0; background: white; cursor: pointer; display: block; width: 100%; font-weight: bold; font-family: inherit; }
        .hint-box { background: #ffcccc; padding: 10px; border-radius: 8px; margin-top: 15px; color: #333; font-weight: bold; }
        .feedback-correct { border: 2px solid green; background: #d4edda; padding: 10px; border-radius: 8px; color: #155724; font-weight: bold; margin-top: 15px; }
        #logo-screen, #intro-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        .hidden { display: none !important; }
        #q-text { font-weight: bold; font-size: 1.0rem; margin-bottom: 15px; text-align: left; }
    </style>
</head>
<body>

<div id="logo-screen"><img src="assets/innovine-logo.png" alt="Logo"></div>

<div id="intro-screen" class="hidden">
    <h1>OpenOffice 4 Calc-II</h1>
    <p><strong>Grade:</strong> 6</p>
    <p><strong>Subject:</strong> ICT</p>
    <p><strong>Topic:</strong>OpenOffice 4 Calc-II</p>
    <button onclick="startQuiz()" style="padding: 15px 30px; font-size: 18px; font-family: inherit; cursor: pointer;">Start Quiz</button>
</div>

<div id="quiz-container">
    <div id="game-area" class="hidden">
        <div id="top-bar">
            <div id="timer">45s</div>
            <div id="score-display">Score: 0</div>
        </div>
        <div id="q-text"></div>
        <div id="options"></div>
        <div id="feedback"></div>
    </div>
</div>

<script>
    const questions = [
        { q: "A teacher wants to arrange the names of her students in the attendance register alphabetically from A to Z. Which feature of OpenOffice Calc should she use?", a: "Sorting in Ascending order", options: ["Filtering", "Sorting in Ascending order", "Sorting in Descending order", "AutoFill"], hint: "Think of alphabetical order from start to finish." },
        { q: "A store manager wants to review his product list starting from the most expensive item down to the cheapest. How should he sort the 'Price' column?", a: "Descending Order", options: ["Oldest to Newest", "Ascending Order", "Descending Order", "A to Z"], hint: "Think of values going from high to low." },
        { q: "An HR manager has a large employee dataset and wants to organize it by Department, then by Job Title, and finally by Salary. In OpenOffice Calc, what is the maximum number of criteria you can apply sequentially using the Sort dialog?", a: "Three", options: ["One", "Two", "Three", "Unlimited"], hint: "Remember the number of sorting levels available in the dialog." },
        { q: "The school principal only wants to view the records of students belonging to the 'Red House' without deleting the rest of the school's data. Which feature is best suited for this task?", a: "Filter", options: ["Sort Ascending", "Filter", "Fill Handle", "MAX Function"], hint: "This is used to hide data that doesn't match specific criteria." },
        { q: "Rohan wants to quickly filter a dataset by clicking on drop-down arrows that appear automatically in the title row of each column. Which specific feature does this?", a: "AutoFilter", options: ["Advanced Filter", "AutoFilter", "Standard Filter", "Dropdown Filter"], hint: "This is the quick-access tool for filtering with dropdowns." },
        { q: "Sarah applied a filter to her spreadsheet to see only 'Stationery' items. She now wants to remove this filter entirely so she can view all items again. What path should she follow?", a: "Data -> Filter -> Remove Filter", options: ["Data -> Sort -> Remove", "Insert -> Filter -> Delete", "Data -> Filter -> Remove Filter", "Format -> Clear -> Filter"], hint: "Look under the 'Data' menu for filter management." },
        { q: "Aman is trying to calculate his total expenses. He types 'SUM(B2:B5)' in a cell, but Calc just displays the text instead of the result. What mandatory symbol did he forget to place at the beginning?", a: "= (Equal to sign)", options: ["+ (Plus sign)", "= (Equal to sign)", "* (Asterisk)", "/ (Forward slash)"], hint: "Formulas in Calc always start with this special character." },
        { q: "A shopkeeper wants to find the total sales amount from Monday to Friday (cells D2 to D6). Which of the following is the correct function to use?", a: "=SUM(D2:D6)", options: ["=AVERAGE(D2:D6)", "=COUNT(D2:D6)", "=MAX(D2:D6)", "=SUM(D2:D6)"], hint: "Which function is used for addition?" },
        { q: "A student has entered his marks for 5 subjects in cells C1 through C5. He wants to know his average score. Which function should he use?", a: "Either A or B", options: ["=SUM(C1:C5)/5", "=AVERAGE(C1:C5)", "Either A or B", "=MIN(C1:C5)"], hint: "Both mathematical expressions arrive at the same result." },
        { q: "A surveyor has a list of 50 houses, but only 30 families provided their phone numbers (numeric data). Which function will help him count exactly how many cells contain numeric data?", a: "=COUNT()", options: ["=COUNT()", "=SUM()", "=MAX()", "=AVERAGE()"], hint: "This function counts cells containing numbers." },
        { q: "Riya is recording the daily temperature for the month of January. At the end of the month, she wants to quickly find out the coldest temperature recorded. Which statistical function will return this value?", a: "=MIN()", options: ["=COLD()", "=LOW()", "=MIN()", "=MAX()"], hint: "Which function retrieves the lowest numeric value?" },
        { q: "A sports coach wants to quickly identify the highest score achieved by a player in a recent cricket tournament from a long list of scores. Which function should he use?", a: "=MAX()", options: ["=SUM()", "=MAX()", "=MIN()", "=COUNT()"], hint: "Which function retrieves the highest numeric value?" },
        { q: "Meera calculated the total marks for the first student in cell E3. She does not want to manually type the formula for the remaining 39 students. Which feature allows her to drag and copy the formula to the other cells?", a: "Fill Handle", options: ["Function Wizard", "AutoFilter", "Sort", "Fill Handle"], hint: "Use this feature at the corner of a cell to copy formulas." },
        { q: "A user typed the formula =5+2*3 in OpenOffice Calc. The software multiplies 2*3 first and then adds 5. Which mathematical rule does OpenOffice Calc strictly follow?", a: "BEDMAS", options: ["FILTER", "BEDMAS", "ASCII", "HTML"], hint: "This is the acronym for the order of operations." },
        { q: "If a user doesn't remember the exact spelling or syntax of a predefined formula, which feature in OpenOffice Calc opens up a list of all available functions to choose from?", a: "Function Wizard", options: ["Formula Wizard", "Function Wizard", "Sort Criteria", "Standard Filter"], hint: "This is the helper tool for selecting and inserting functions." },
        { q: "When you select a single cell containing a text value and click on the 'Sort' option, what does OpenOffice Calc do by default?", a: "It sorts the entire column based on the data type inside the selected cell.", options: ["It only sorts that specific cell.", "It deletes the cell if it does not match the criteria.", "It sorts the entire column based on the data type inside the selected cell.", "It opens the Function Wizard."], hint: "Calc is smart enough to identify the context of the entire column." }
    ];

    let currentQ = 0, score = 0, attempts = 0, timer, timeLeft = 45;

    window.addEventListener('load', () => setTimeout(() => {
        document.getElementById('logo-screen').classList.add('hidden');
        document.getElementById('intro-screen').classList.remove('hidden');
    }, 5000));

    function startQuiz() {
        document.getElementById('intro-screen').classList.add('hidden');
        document.getElementById('game-area').classList.remove('hidden');
        renderQuestion();
    }

    function renderQuestion() {
        clearInterval(timer);
        attempts = 0; timeLeft = 45;
        document.getElementById('timer').innerText = timeLeft + "s";
        document.getElementById('feedback').className = "";
        document.getElementById('feedback').innerText = "";
        
        const q = questions[currentQ];
        document.getElementById('q-text').innerHTML = (currentQ + 1) + ". " + q.q;
        const optDiv = document.getElementById('options');
        optDiv.innerHTML = "";
        q.options.forEach(o => {
            const btn = document.createElement('button');
            btn.className = "option-btn";
            btn.innerText = o;
            btn.onclick = () => checkAnswer(o);
            optDiv.appendChild(btn);
        });

        timer = setInterval(() => {
            timeLeft--;
            document.getElementById('timer').innerText = timeLeft + "s";
            if(timeLeft <= 0) { clearInterval(timer); nextQuestion(); }
        }, 1000);
    }

    function checkAnswer(choice) {
        const feedback = document.getElementById('feedback');
        if(choice === questions[currentQ].a) {
            score++;
            document.getElementById('score-display').innerText = "Score: " + score;
            feedback.className = 'feedback-correct';
            feedback.innerText = "Correct!";
            setTimeout(nextQuestion, 1000);
        } else {
            attempts++;
            if(attempts < 2) {
                feedback.className = 'hint-box';
                feedback.innerText = "Hint: " + questions[currentQ].hint;
            } else {
                feedback.className = 'feedback-correct';
                feedback.innerText = "Correct answer was: " + questions[currentQ].a;
                setTimeout(nextQuestion, 2000);
            }
        }
    }

    function nextQuestion() {
        currentQ++;
        if(currentQ < questions.length) renderQuestion();
        else {
            document.getElementById('game-area').innerHTML = `<h1>Quiz Finished!</h1><p>Score: ${score}/${questions.length}</p><button onclick="location.reload()">Restart Quiz</button>`;
        }
    }
</script>
</body>
</html>
